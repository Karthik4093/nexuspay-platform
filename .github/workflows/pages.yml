name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API URL from secret (optional)
        # If you set NEXUSPAY_API_URL in GitHub repo secrets,
        # it will be baked into config.js at deploy time.
        run: |
          if [ -n "${{ secrets.NEXUSPAY_API_URL }}" ]; then
            echo "window.NEXUSPAY_CONFIG = { API_URL: '${{ secrets.NEXUSPAY_API_URL }}' };" \
              > frontend/config.js
            echo "API URL injected from secret"
          else
            echo "No NEXUSPAY_API_URL secret found — using default localhost URL in config.js"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
