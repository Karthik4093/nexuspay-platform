name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Node.js API Gateway - Lint, Build, Test
  # ============================================================
  node-ci:
    name: Node.js API Gateway
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexuspay_test
          POSTGRES_USER: nexuspay
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nexuspay:test_password@localhost:5432/nexuspay_test
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long
      NODE_ENV: test
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run Prisma migrations
        run: npm run db:migrate

      - name: TypeScript build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --reporter=verbose

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: coverage/lcov.info
          flags: nodejs

  # ============================================================
  # Python Microservices Tests
  # ============================================================
  python-ci:
    name: Python Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - fraud-detection
          - currency-conversion
          - tax-calculation
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests/ -v --tb=short

  # ============================================================
  # Docker Build Validation
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [node-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nexuspay-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Fraud Detection
        uses: docker/build-push-action@v5
        with:
          context: services/fraud-detection
          push: false
          tags: nexuspay-fraud:test

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
