<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchants - NexusPay</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="logo">⚡ NexusPay</div><button class="sidebar-toggle" id="sidebarToggle">☰</button></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
        <a href="payments.html" class="nav-item"><span class="nav-icon">💳</span><span class="nav-label">Payments</span></a>
        <a href="merchants.html" class="nav-item active"><span class="nav-icon">🏪</span><span class="nav-label">Merchants</span></a>
        <a href="customers.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Customers</span></a>
        <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span class="nav-label">Reports</span></a>
        <a href="monitoring.html" class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">Monitoring</span></a>
      </nav>
      <div class="sidebar-footer"><div class="user-info" id="userInfo"></div><button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button></div>
    </aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-title"><h1>Merchants</h1><p>Manage merchant accounts and settings</p></div>
        <div class="header-actions"><button class="btn btn-primary" id="createMerchantBtn">+ New Merchant</button></div>
      </header>
      <div class="filters-bar">
        <input type="text" id="searchInput" placeholder="Search merchants..." />
        <select id="statusFilter" class="filter-select">
          <option value="">All Statuses</option>
          <option value="PENDING">Pending</option>
          <option value="ACTIVE">Active</option>
          <option value="SUSPENDED">Suspended</option>
        </select>
        <button class="btn btn-secondary" id="applyFilters">Filter</button>
      </div>
      <div class="merchants-grid" id="merchantsGrid">
        <div class="loading-placeholder">Loading merchants...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/merchants.js"></script>
</body>
</html>
