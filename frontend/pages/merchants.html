<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchants - NexusPay</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="logo">⚡ NexusPay</div><button class="sidebar-toggle" id="sidebarToggle">☰</button></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
        <a href="payments.html" class="nav-item"><span class="nav-icon">💳</span><span class="nav-label">Payments</span></a>
        <a href="merchants.html" class="nav-item active"><span class="nav-icon">🏪</span><span class="nav-label">Merchants</span></a>
        <a href="customers.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Customers</span></a>
        <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span class="nav-label">Reports</span></a>
        <a href="monitoring.html" class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">Monitoring</span></a>
      </nav>
      <div class="sidebar-footer"><div class="user-info" id="userInfo"></div><button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button></div>
    </aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-title"><h1>Merchants</h1><p>Manage merchant accounts and settings</p></div>
        <div class="header-actions"><button class="btn btn-primary" id="createMerchantBtn">+ New Merchant</button></div>
      </header>
      <div class="filters-bar">
        <input type="text" id="searchInput" placeholder="Search merchants..." />
        <select id="statusFilter" class="filter-select">
          <option value="">All Statuses</option>
          <option value="PENDING">Pending</option>
          <option value="ACTIVE">Active</option>
          <option value="SUSPENDED">Suspended</option>
        </select>
        <button class="btn btn-secondary" id="applyFilters">Filter</button>
      </div>
      <div class="merchants-grid" id="merchantsGrid">
        <div class="loading-placeholder">Loading merchants...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </main>
  </div>
  <!-- Create/Edit Merchant Modal -->
  <div id="merchantModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;">
    <div style="background:var(--surface,#1e293b);border-radius:12px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);">
      <h3 id="modalTitle" style="margin:0 0 1.5rem;font-size:1.2rem;">New Merchant</h3>
      <form id="merchantForm">
        <div style="display:grid;gap:1rem;">
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Business Name *</label>
            <input id="mName" type="text" required placeholder="Acme Corp" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Email *</label>
            <input id="mEmail" type="email" required placeholder="billing@acme.com" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div>
              <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Country (2-letter)</label>
              <input id="mCountry" type="text" maxlength="2" placeholder="US" value="US" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
            </div>
            <div>
              <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Currency (3-letter)</label>
              <input id="mCurrency" type="text" maxlength="3" placeholder="USD" value="USD" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
            </div>
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Phone</label>
            <input id="mPhone" type="text" placeholder="+1 555 000 0000" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Website</label>
            <input id="mWebsite" type="url" placeholder="https://acme.com" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Business Type</label>
            <input id="mBusinessType" type="text" placeholder="E-commerce, SaaS, Retail..." style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--text-muted,#94a3b8);margin-bottom:.4rem;">Webhook URL</label>
            <input id="mWebhookUrl" type="url" placeholder="https://acme.com/webhooks/nexuspay" style="width:100%;padding:.6rem .8rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.95rem;box-sizing:border-box;" />
          </div>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;">
          <button type="button" id="modalCancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="modalSubmitBtn" class="btn btn-primary">Create Merchant</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create Merchant User Modal -->
  <div id="userModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;">
    <div style="background:var(--surface,#1e293b);border-radius:12px;padding:2rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.5);">
      <h3 style="margin:0 0 .4rem;font-size:1.1rem;">Create Login Account</h3>
      <p id="userModalSubtitle" style="margin:0 0 1.25rem;font-size:.85rem;color:var(--text-muted,#94a3b8);"></p>
      <form id="userForm">
        <div style="display:grid;gap:.9rem;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;">
            <div>
              <label style="display:block;font-size:.82rem;color:var(--text-muted,#94a3b8);margin-bottom:.35rem;">First Name *</label>
              <input id="uFirstName" type="text" required placeholder="John" style="width:100%;padding:.55rem .75rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.9rem;box-sizing:border-box;" />
            </div>
            <div>
              <label style="display:block;font-size:.82rem;color:var(--text-muted,#94a3b8);margin-bottom:.35rem;">Last Name *</label>
              <input id="uLastName" type="text" required placeholder="Doe" style="width:100%;padding:.55rem .75rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.9rem;box-sizing:border-box;" />
            </div>
          </div>
          <div>
            <label style="display:block;font-size:.82rem;color:var(--text-muted,#94a3b8);margin-bottom:.35rem;">Email *</label>
            <input id="uEmail" type="email" required placeholder="john@merchant.com" style="width:100%;padding:.55rem .75rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.9rem;box-sizing:border-box;" />
          </div>
          <div>
            <label style="display:block;font-size:.82rem;color:var(--text-muted,#94a3b8);margin-bottom:.35rem;">Password *</label>
            <input id="uPassword" type="text" required placeholder="Min 8 chars, uppercase, number, special (!@#$)" style="width:100%;padding:.55rem .75rem;background:var(--surface2,#0f172a);border:1px solid var(--border,#334155);border-radius:6px;color:inherit;font-size:.9rem;box-sizing:border-box;" />
            <small style="color:var(--text-muted,#94a3b8);font-size:.78rem;">Must have uppercase, lowercase, number and special character</small>
          </div>
        </div>
        <div id="userFormError" style="display:none;margin-top:.75rem;padding:.6rem .8rem;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:6px;color:#f87171;font-size:.85rem;"></div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.25rem;">
          <button type="button" id="userModalCancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="userModalSubmitBtn" class="btn btn-primary">Create Account</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../js/api.js?v=2"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/merchants.js?v=2"></script>
</body>
</html>
